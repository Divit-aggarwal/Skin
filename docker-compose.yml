services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skin}
      POSTGRES_DB: ${POSTGRES_DB:-skindb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skin} -d ${POSTGRES_DB:-skindb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-skin}:${POSTGRES_PASSWORD:-skin}@postgres:5432/${POSTGRES_DB:-skindb}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app

  inference:
    build:
      context: ./inference
    environment:
      PORT: "8001"
    ports:
      - "8001:8001"

volumes:
  postgres_data:
